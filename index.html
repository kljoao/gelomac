<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gelomac Oficial</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,400,0,0" />
</head>

<body>
    
    <header class="header">
        <img src="/img/logo.png" alt="Logo" width="225px">
        <nav class="nav-container">
            <ul class="nav">
                <li><button class="black-18-normal nav-button">Inicio</button></li>
                <li><button class="black-18-normal nav-button">Serviços</button></li>
                <li><button class="black-18-normal nav-button">História</button></li>
                <li><button class="black-18-normal nav-button">Contato</button></li>
            </ul>
        </nav>

        <button class="menu">
            <span class="material-symbols-outlined">
                menu
            </span>
        </button>
    </header>

    <main class="main-container">
        <div>
            <h1 class="main-title" id="titulo">Refresque-se no Dia a Dia Com Conforto e Qualidade.</h1>
            <button class="button-cnt"><a href="/" class="white-18-normal">Entre em Contato</a></button>

        <img src="/img/logo-rotate.svg" alt="" width="350px" class="main-img">
    </main>
    
    <script src="/script.js"></script>

</html>
